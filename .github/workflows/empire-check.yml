name: Portfolio Compliance Check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install, test, and build
        run: |
          npm ci
          npm run test:quality
          npm run build

  compliance:
    name: Public-file compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required public files exist
        shell: bash
        run: |
          FAILED=0
          for STEM in ads robots llms; do
            if [ -f "public/${STEM}.txt" ] || [ -f "${STEM}.txt" ]; then
              echo "Found ${STEM}.txt"
            else
              echo "::error::Missing ${STEM}.txt"
              FAILED=1
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

      - name: AdSense publisher ID is authorized
        shell: bash
        run: |
          ADS_FILE=""
          if [ -f public/ads.txt ]; then ADS_FILE="public/ads.txt"; fi
          if [ -z "$ADS_FILE" ] && [ -f ads.txt ]; then ADS_FILE="ads.txt"; fi
          grep -qF "pub-7171402107622932" "$ADS_FILE"

      - name: Search crawler directives are explicit
        shell: bash
        run: |
          ROBOTS_FILE=""
          if [ -f public/robots.txt ]; then ROBOTS_FILE="public/robots.txt"; fi
          if [ -z "$ROBOTS_FILE" ] && [ -f robots.txt ]; then ROBOTS_FILE="robots.txt"; fi
          grep -q "^User-agent: \*" "$ROBOTS_FILE"
          grep -q "^Sitemap: https://fibertools.app/sitemap.xml" "$ROBOTS_FILE"

      - name: IndexNow key file exists
        shell: bash
        run: |
          KEY_FILE=$(find public . -maxdepth 1 -type f -name "*.txt" 2>/dev/null | grep -E '/[0-9a-f]{32}\.txt$' | head -n 1 || true)
          if [ -z "$KEY_FILE" ]; then
            echo "::error::No IndexNow key file found"
            exit 1
          fi
